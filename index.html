<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الناصري للتقنية - Al-Naseri</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8c2c;
            --bg-black: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.8);
            --blue-neon: #00d2ff;
            --red-neon: #ff0055;
        }

        body {
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: #fff;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        .main-wrapper {
            border: 1px solid var(--gold);
            margin: 40px auto;
            padding: 40px 20px;
            width: 90%;
            max-width: 450px;
            border-radius: 30px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            position: relative;
            /* تأثير التوهج الذهبي حول حواف الموقع */
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), 
                        inset 0 0 15px rgba(212, 175, 55, 0.05);
            /* إضافة تأثير إضاءة خارجية متغيرة */
            animation: wrapperGlow 4s infinite alternate;
        }

        @keyframes wrapperGlow {
            0% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
            100% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.25); }
        }

        /* تنسيق صورة البروفايل المتوهجة بالذهب */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            margin-top: 45px;
            padding: 5px;
            background: #000;
            object-fit: cover;
            /* تأثير توهج نيون ذهبي قوي حول الصورة */
            box-shadow: 0 0 25px var(--gold), 
                        inset 0 0 10px rgba(212, 175, 55, 0.3);
            /* إضافة تأثير تذبذب خفيف لتبدو كأنها تضيء */
            animation: imgNeonGlow 2s infinite alternate;
        }

        @keyframes imgNeonGlow {
            0% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
            100% { box-shadow: 0 0 35px rgba(212, 175, 55, 0.9); }
        }

        .curved-header {
            position: relative;
            margin-bottom: 30px;
        }

        .curved-name-svg {
            width: 100%;
            height: 100px;
            position: absolute;
            top: -30px;
            left: 0;
            z-index: 2;
        }

        .curved-text {
            fill: var(--gold);
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
        }

        h2 {
            color: var(--gold);
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .famous-quote {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
            direction: ltr;
            animation: colorShift 4s infinite alternate;
        }

        @keyframes colorShift {
            0% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
            25% { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
            50% { color: #00d2ff; text-shadow: 0 0 10px #00d2ff; }
            75% { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        }

        .tagline {
            color: #777;
            font-size: 0.85rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* تنسيق الشريط المتحرك الملون */
        .scrolling-bar {
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            margin: 15px 0;
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
        }

        .scrolling-text {
            display: inline-block;
            font-weight: bold;
            font-size: 1rem;
            animation: colorShift 4s infinite alternate, scroll-left 15s linear infinite;
        }

        @keyframes scroll-left {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .hr-gold {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 20px 0;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: #000;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin: 12px auto;
            width: 85%;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .app-card {
            background: rgba(255, 255, 255, 0.03);
            border-right: 3px solid var(--gold);
            border-radius: 10px;
            padding: 15px;
            margin: 15px auto;
            width: 85%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-info h3 {
            margin: 0;
            font-size: 0.90rem;
            color: #ddd;
            text-align: right;
        }

        .app-info span {
            display: block;
            font-size: 0.70rem;
            color: var(--gold);
            margin-top: 3px;
        }

        .download-btn {
            background: var(--gold);
            color: #000;
            padding: 8px 12px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.80rem;
            font-weight: bold;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="curved-header">
