<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبد الناصر الشميري - الناصري</title>
    <style>
        body {
            background-color: #050505;
            color: #f1c40f;
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .main-wrapper {
            border: 3px solid #f1c40f;
            margin: 30px auto;
            padding: 40px 20px;
            width: 88%;
            max-width: 500px;
            border-radius: 25px;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.4), inset 0 0 10px rgba(241, 196, 15, 0.2);
            background: rgba(13, 13, 13, 0.95);
            position: relative;
        }

        .curved-header {
            position: relative;
            margin-bottom: 20px;
        }

        .curved-name-svg {
            width: 100%;
            height: 90px;
            position: absolute;
            top: -25px;
            left: 0;
            z-index: 2;
        }

        .curved-text {
            fill: #f1c40f;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.7);
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #f1c40f;
            margin-top: 40px;
            box-shadow: 0 0 20px #f1c40f;
            transition: 0.5s;
            position: relative;
            z-index: 1;
        }

        .profile-img:hover {
            transform: scale(1.08) rotate(5deg);
        }

        h2 {
            font-size: 1.6rem;
            color: #fff;
            text-shadow: 0 0 15px #f1c40f;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        p {
            font-size: 1.1rem;
            color: #ccc;
            margin-top: 0;
        }

        .hr-gold {
            border: 0;
            height: 1.5px;
            background: linear-gradient(to right, transparent, #f1c40f, transparent);
            margin: 25px 0;
        }

        .btn-action {
            display: block;
            background: linear-gradient(45deg, #f1c40f, #a0810d);
            color: #000;
            padding: 15px 30px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 15px auto;
            width: 80%;
            box-shadow: 0 6px 20px rgba(241, 196, 15, 0.3);
            transition: 0.4s;
        }

        /* زر الواتساب باللون الأزرق */
        .btn-whatsapp {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: #fff;
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.3);
        }

        .btn-action:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #f1c40f;
        }

        .btn-whatsapp:hover {
            box-shadow: 0 0 25px #007bff;
        }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="curved-header">
            <svg class="curved-name-svg" viewBox="0 0 500 150">
                <path id="curvePath" d="M 50 120 C 150 50, 350 50, 450 120" fill="transparent" />
                <text class="curved-text">
                    <textPath href="#curvePath" startOffset="50%" text-anchor="middle">
                        عبد الناصر الشميري
                    </textPath>
                </text>
            </svg>

            <img src="https://github.com/alnasree2027-pixel.png" alt="الناصري" class="profile-img">
        </div>

        <h2>الناصري للتقنية</h2>
        <p>مصمم كيبوردات وتطبيقات | مشاريع حصرية</p>
        <hr class="hr-gold">
        
        <a href="https://t.me/tukgyguiggh" class="btn-action">انضم لقناتي على تليجرام</a>
        
        <a href="https://wa.me/967739841457" class="btn-action btn-whatsapp">تواصل معي عبر واتساب</a>
    </div>

</body>
</html>
