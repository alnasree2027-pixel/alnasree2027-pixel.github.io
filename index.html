<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الناصري للتقنية - Al-Naseri</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8c2c;
            --bg-black: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.8);
            --blue-neon: #00d2ff;
        }

        body {
            background-color: var(--bg-black);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: #fff;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        .main-wrapper {
            border: 1px solid var(--gold);
            margin: 40px auto;
            padding: 40px 20px;
            width: 90%;
            max-width: 450px;
            border-radius: 30px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15), inset 0 0 15px rgba(212, 175, 55, 0.05);
            position: relative;
        }

        .curved-header {
            position: relative;
            margin-bottom: 30px;
        }

        .curved-name-svg {
            width: 100%;
            height: 100px;
            position: absolute;
            top: -30px;
            left: 0;
            z-index: 2;
        }

        .curved-text {
            fill: var(--gold);
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            letter-spacing: 2px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            margin-top: 45px;
            padding: 5px;
            box-shadow: 0 0 25px var(--gold);
            background: #000;
        }

        h2 {
            color: var(--gold);
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .famous-quote {
            font-size: 1.3rem;
            font-weight: bold;
            font-style: italic;
            margin-bottom: 5px;
            background: linear-gradient(to right, #d4af37 0%, #fff 50%, #d4af37 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2.5s linear infinite;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .tagline {
            color: #777;
            font-size: 0.85rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .hr-gold {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
            margin: 20px 0;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: #000;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin: 12px auto;
            width: 85%;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-whatsapp {
            background: transparent;
            color: var(--blue-neon);
            border: 1px solid var(--blue-neon);
        }

        .btn-action:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 0 20px var(--gold);
        }

        .btn-whatsapp:hover {
            background: var(--blue-neon);
            color: #000;
            box-shadow: 0 0 20px var(--blue-neon);
        }

        .app-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--gold);
            border-radius: 10px;
            padding: 15px;
            margin: 15px auto;
            width: 85%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-info h3 {
            margin: 0;
            font-size: 0.95rem;
            color: #ddd;
            text-align: right;
        }

        .app-info span {
            display: block;
            font-size: 0.75rem;
            color: var(--gold);
            margin-top: 3px;
        }

        .download-btn {
            background: var(--gold);
            color: #000;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="curved-header">
            <svg class="curved-name-svg" viewBox="0 0 500 150">
                <path id="curvePath" d="M 80 120 C 180 40, 320 40, 420 120" fill="transparent" />
                <text class="curved-text">
                    <textPath href="#curvePath" startOffset="50%" text-anchor="middle">
                        عبد الناصر الشميري
                    </textPath>
                </text>
            </svg>
            <img src="https://github.com/alnasree2027-pixel.png" alt="الناصري" class="profile-img">
        </div>

        <h2>الناصري للتقنية</h2>
        <p class="famous-quote">كن من تكون لاتهمني</p>
        <p class="tagline">DEVELOPER & DESIGNER | EXCLUSIVE PROJECTS</p>
        
        <hr class="hr-gold">
        
        <a href="https://t.me/tukgyguiggh" class="btn-action">القناة الرسمية (تليجرام)</a>
        <a href="https://wa.me/967739841457" class="btn-action btn-whatsapp">تواصل مباشر (واتساب)</a>

        <hr class="hr-gold">
        <h3 style="color: var(--gold); font-size: 1.1rem; margin-bottom: 15px;">متجر تطبيقات الناصري</h3>

        <div class="app-card">
            <div class="app-info">
                <h3>فيروسات الناصري</h3>
                <span>إصدار V1.0 حصري</span>
            </div>
            <a href="☠️فيروسات..الأناصري..1.0_✔️.apk" download class="download-btn">تحميل APK</a>
        </div>

    </div>

</body>
</html>
